name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Crystal
        uses: crystal-lang/install-crystal@v2
        with:
          crystal-version: 'latest'

      - name: Install dependencies
        run: |
          shards install
          make install

      - name: Run tests
        run: make test

      - name: Run Rust API compatibility tests
        run: crystal spec spec/rust_api_spec.cr

      - name: Check formatting
        run: make lint

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Crystal
        uses: crystal-lang/install-crystal@v2
        with:
          crystal-version: 'latest'

      - name: Install dependencies
        run: shards install

      - name: Generate API documentation
        run: |
          crystal docs --project-name="bidi" --project-version="$(shards version)" --output=./temp-docs
          echo "API documentation generated successfully"